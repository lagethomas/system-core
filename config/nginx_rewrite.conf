# ─────────────────────────────────────────────────────────────────
# SaaSFlow Core — Configuração Nginx
# Cole as regras abaixo dentro do bloco server {} do seu site.
# O "root" do Nginx DEVE apontar para a pasta /public do projeto.
# ─────────────────────────────────────────────────────────────────
#
# Exemplo de bloco completo:
#
# server {
#     listen 80;
#     server_name app.saasflow.com.br;
#     root /www/wwwroot/app.saasflow.com.br/public;
#     index index.php;
#
#     # Cole as regras abaixo aqui
# }
# ─────────────────────────────────────────────────────────────────

# ── Regra principal: Clean URLs sem .php ─────────────────────────
location / {
    # Tenta servir arquivo real -> diretório real -> Front Controller
    try_files $uri $uri/ /index.php?$query_string;
}

# ── PHP-FPM handler ──────────────────────────────────────────────
location ~ \.php$ {
    include        fastcgi_params;
    fastcgi_pass   unix:/tmp/php-cgi-83.sock;   # Ajuste conforme seu servidor
    fastcgi_index  index.php;
    fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

# ── Segurança: nega acesso a pastas internas ─────────────────────
location ~ ^/(src|config|includes|routes|logs)/ {
    deny all;
    return 404;
}

# ── Segurança: nega arquivos sensíveis ───────────────────────────
location ~ \.(env|log|sql|sh|bak|git)$ {
    deny all;
    return 404;
}

# ── Cache de assets estáticos ────────────────────────────────────
location ~* \.(css|js|png|jpg|jpeg|webp|svg|woff2|ico)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}
